services:

  backend:
    build: ./backend
    container_name: uda_backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: uda_frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend


  db:
    image: postgres:16

    container_name: uda_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urdu_documents

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    container_name: uda_redis

    ports:
      - "6379:6379"